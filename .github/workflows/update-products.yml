name: Actualizar catálogo

on:
  repository_dispatch:
    types: [update-products]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar y escribir products.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const products = context.payload.client_payload.products;

            if (!Array.isArray(products)) {
              core.setFailed('El payload no es un array de productos válido.');
              return;
            }
            for (const p of products) {
              if (!p.id || !p.name || typeof p.price !== 'number') {
                core.setFailed(`Producto inválido: ${JSON.stringify(p)}`);
                return;
              }
            }
            fs.writeFileSync('data/products.json', JSON.stringify(products, null, 2) + '\n');

      - name: Commit y push
        run: |
          git config user.name "BFast Clothe Bot"
          git config user.email "bot@bfastclothe.local"
          git add data/products.json
          git diff --staged --quiet && echo "Sin cambios, nada que commitear." && exit 0
          git commit -m "Catálogo actualizado desde el panel admin"
          git push
